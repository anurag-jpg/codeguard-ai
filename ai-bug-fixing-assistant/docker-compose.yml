version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  faiss-data:
  repo-cache:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: bugfix-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - FAISS_INDEX_PATH=/data/faiss_index
    volumes:
      - faiss-data:/data/faiss_index
      - repo-cache:/data/repositories
    ports:
      - "8000:8000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: bugfix-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Redis (session store / job queue for prod scale-out) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: bugfix-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
